
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — ResultMS</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>ResultMS</h2>
      <p>Management System</p>
    </div>
    <nav>
      <a href="dashboard.html" class="nav-item" data-page="dashboard">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="students.html" class="nav-item" data-page="students">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Students
      </a>
      <a href="subjects.html" class="nav-item" data-page="subjects">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Subjects
      </a>
      <a href="results.html" class="nav-item" data-page="results">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Results
      </a>
      <a href="transcript.html" class="nav-item" data-page="transcript">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Transcripts
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-details">
          <p id="userName">Admin</p>
          <span id="userRole">admin</span>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Welcome back — here's an overview of the system</p>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div class="stat-info">
          <p>Total Students</p>
          <h3 id="totalStudents"><span class="spinner"></span></h3>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon cyan">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="stat-info">
          <p>Total Subjects</p>
          <h3 id="totalSubjects"><span class="spinner"></span></h3>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <div class="stat-info">
          <p>Results Entered</p>
          <h3 id="totalResults"><span class="spinner"></span></h3>
        </div>
      </div>
    </div>

    <!-- Recent students -->
    <div class="card">
      <div class="toolbar">
        <h3 style="font-size:16px;font-weight:700;">Recent Students</h3>
        <a href="students.html" class="btn btn-ghost btn-sm">View All</a>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Student ID</th>
              <th>Name</th>
              <th>Class</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody id="recentStudents">
            <tr><td colspan="4"><div class="loading"><div class="spinner"></div> Loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();
  setActivePage("dashboard");
  initSidebar();

  const loadDashboard = async () => {
    try {
      const [students, subjects, results] = await Promise.all([
        api.get("/students"),
        api.get("/subjects"),
        api.get("/results"),
      ]);

      document.getElementById("totalStudents").textContent = students.length;
      document.getElementById("totalSubjects").textContent = subjects.length;
      document.getElementById("totalResults").textContent  = results.length;

      const tbody = document.getElementById("recentStudents");
      const recent = students.slice(0, 6);

      if (!recent.length) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><p>No students yet</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = recent.map(s => `
        <tr>
          <td><strong style="color:var(--text)">${s.studentId}</strong></td>
          <td style="color:var(--text)">${s.name}</td>
          <td>${s.className}</td>
          <td>${s.email}</td>
        </tr>`).join("");
    } catch (err) {
      showToast(err.message, "error");
    }
  };

  loadDashboard();
</script>
</body>
</html>

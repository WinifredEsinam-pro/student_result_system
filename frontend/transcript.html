
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transcript — ResultMS</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><h2>ResultMS</h2><p>Management System</p></div>
    <nav>
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="students.html" class="nav-item" data-page="students"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Students</a>
      <a href="subjects.html" class="nav-item" data-page="subjects"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Subjects</a>
      <a href="results.html" class="nav-item" data-page="results"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Results</a>
      <a href="transcript.html" class="nav-item" data-page="transcript"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Transcripts</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-details"><p id="userName">Admin</p><span id="userRole">admin</span></div>
      </div>
      <button class="logout-btn" id="logoutBtn">Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>Transcripts</h1>
      <p>View full academic record for any student</p>
    </div>

    <!-- Student picker -->
    <div class="card" style="margin-bottom:24px">
      <div style="display:flex;gap:12px;align-items:flex-end">
        <div class="form-group" style="flex:1">
          <label>Select Student</label>
          <select id="studentSelect">
            <option value="">Choose a student...</option>
          </select>
        </div>
        <button class="btn btn-primary" id="viewBtn">View Transcript</button>
      </div>
    </div>

    <!-- Transcript output -->
    <div id="transcriptOutput" style="display:none">

      <div class="card">
        <div class="transcript-header">
          <div>
            <h2 style="font-size:22px;font-weight:800" id="tName">—</h2>
            <p style="color:var(--text2);margin-top:4px">
              <span id="tId" style="margin-right:16px"></span>
              <span id="tClass"></span>
            </p>
            <p style="color:var(--text3);font-size:13px;margin-top:4px" id="tEmail"></p>
          </div>
          <div class="cgpa-display">
            <p>Cumulative GPA</p>
            <h2 id="tCgpa">0.00</h2>
          </div>
        </div>

        <div id="semesterBlocks"></div>
      </div>
    </div>

    <div id="emptyTranscript" style="display:none">
      <div class="card">
        <div class="empty-state">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>No results found for this student</p>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();
  setActivePage("transcript");
  initSidebar();

  const loadStudents = async () => {
    try {
      const students = await api.get("/students");
      const sel = document.getElementById("studentSelect");
      sel.innerHTML = `<option value="">Choose a student...</option>` +
        students.map(s => `<option value="${s._id}">${s.name} — ${s.studentId} (${s.className})</option>`).join("");
    } catch (err) { showToast(err.message, "error"); }
  };

  document.getElementById("viewBtn").addEventListener("click", async () => {
    const id = document.getElementById("studentSelect").value;
    if (!id) { showToast("Please select a student", "error"); return; }

    document.getElementById("transcriptOutput").style.display  = "none";
    document.getElementById("emptyTranscript").style.display   = "none";

    try {
      const data = await api.get(`/results/student/${id}`);
      const { student, results, cgpa } = data;

      if (!results.length) {
        document.getElementById("emptyTranscript").style.display = "block";
        return;
      }

      document.getElementById("tName").textContent  = student.name;
      document.getElementById("tId").textContent    = `ID: ${student.studentId}`;
      document.getElementById("tClass").textContent = `Class: ${student.className}`;
      document.getElementById("tEmail").textContent = student.email;
      document.getElementById("tCgpa").textContent  = cgpa.toFixed(2);

      const blocks = document.getElementById("semesterBlocks");
      blocks.innerHTML = results.map(r => `
        <div class="semester-block">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <h4>${r.semester}</h4>
            <div style="display:flex;gap:10px;align-items:center">
              <span class="gpa-badge ${gpaClass(r.gpa)}">GPA: ${r.gpa}</span>
              <span class="badge ${r.remarks === 'Pass' ? 'pass' : 'fail'}">${r.remarks}</span>
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Subject</th>
                  <th>Code</th>
                  <th>Credits</th>
                  <th>Score</th>
                  <th>Grade</th>
                  <th>Points</th>
                </tr>
              </thead>
              <tbody>
                ${r.results.map(item => `
                  <tr>
                    <td style="color:var(--text)">${item.subject?.name || "—"}</td>
                    <td style="color:var(--accent);font-family:'Syne',sans-serif">${item.subject?.code || "—"}</td>
                    <td>${item.subject?.creditHours || "—"}</td>
                    <td><strong style="color:var(--text)">${item.score}</strong></td>
                    <td>
                      <span class="gpa-badge ${item.grade === 'F' ? 'gpa-low' : item.gradePoints >= 3.5 ? 'gpa-high' : 'gpa-mid'}">
                        ${item.grade}
                      </span>
                    </td>
                    <td>${item.gradePoints.toFixed(1)}</td>
                  </tr>`).join("")}
              </tbody>
            </table>
          </div>
        </div>`).join(`<hr style="border:none;border-top:1px solid var(--border);margin:20px 0"/>`);

      document.getElementById("transcriptOutput").style.display = "block";
    } catch (err) { showToast(err.message, "error"); }
  });

  loadStudents();
</script>
</body>
</html>
